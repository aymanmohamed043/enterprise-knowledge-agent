services:
    db:
        image: postgres:15
        container_name: enterprise_db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: enterprise_db
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    chroma:
        image: chromadb/chroma:latest
        container_name: enterprise_chroma
        ports:
            - "8001:8000"
        volumes:
            - chroma_data:/chroma/chroma

    backend:
        build:
            context: .
            dockerfile: backend/Dockerfile
        container_name: enterprise_backend
        ports:
            - "8000:8000"
        env_file:
            - backend/.env
        environment:
            DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/enterprise_db
            CHROMA_HOST: chroma
            CHROMA_PORT: "8000"
        depends_on:
            - db
            - chroma
        volumes:
            - ./backend:/app/backend
        command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

    frontend:
        build:
            context: .
            dockerfile: frontend/Dockerfile
            args:
                VITE_API_URL: http://localhost:8000
        container_name: enterprise_frontend
        ports:
            - "3000:80"
        depends_on:
            - backend

volumes:
    postgres_data:
    chroma_data:
    
    





